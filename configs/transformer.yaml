model:
  type: transformer
  embedding_dim: 256
  num_layers: 8
  num_heads: 4
  feedforward_dim: 1024
  intra_doc_masking: true

training:
  batch_size: 64
  sequence_length: 128
  learning_rate: 0.0005
  weight_decay: 0.01
  steps: 5000
  train_log_interval: 50
  eval_interval: 500
  eval_iters: 30
  grad_clip: 1.0
  seed: 42
