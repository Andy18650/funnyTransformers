model:
  type: transformer
  embedding_dim: 512
  num_layers: 8
  num_heads: 4
  feedforward_dim: 2048
  activation: gelu  # gelu | relu | tanh | sigmoid | silu
  intra_doc_masking: true

training:
  # Optional str.format template naming the run after whatever you compare this
  # round. Fields: any model/training key plus {dataset} {precision}
  # {param_count} {note}. Falls back to type_dataset_params[_note] if unset.
  run_name: "{activation}_{param_count}"
  batch_size: 64
  sequence_length: 128
  learning_rate: 0.0005
  weight_decay: 0.01
  steps: 5000
  train_log_interval: 50
  eval_interval: 500
  eval_iters: 30
  grad_clip: 1.0
  seed: 42
